name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Ou "master" selon ta branche par défaut

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build # Vite génère le dossier 'dist' ici

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # C'est le dossier que Vite crée

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
